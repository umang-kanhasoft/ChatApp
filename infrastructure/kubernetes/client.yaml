apiVersion: v1
kind: Service
metadata:
  name: chatapp-client
  labels:
    app: chatapp-client
spec:
  selector:
    app: chatapp-client
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatapp-client
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: chatapp-client
  template:
    metadata:
      labels:
        app: chatapp-client
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: chatapp-client
      containers:
        - name: client
          image: ghcr.io/your-org/chatapp-client:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
